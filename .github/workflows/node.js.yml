# This workflow will do a clean installation of node dependencies, cache/restore them, build the source code and run tests across different versions of node
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-nodejs

name: Node.js CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [24.x]

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: cp_user
          POSTGRES_PASSWORD: cp_pass
          POSTGRES_DB: cp
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DB_URL_TEST: postgresql://cp_user:cp_pass@localhost:5432/cp
      SUPABASE_DEV_URL: postgresql://cp_user:cp_pass@localhost:5432/cp

    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"
      - run: npm ci
      - run: npx prisma generate
      - run: npm run lint
      - run: SUPABASE_PROD_DIRECT="postgresql://cp_user:cp_pass@localhost:5432/cp" npx prisma migrate deploy
      - run: npm test
      - run: npm run build --if-present
